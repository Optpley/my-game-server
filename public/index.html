<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AllPvpGamesHub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="app">

    <header id="main-header">
      <div class="title-row">
        <div class="app-title">AllPvpGamesHub</div>
        <div class="header-right">
          <div class="app-balance" id="header-balance">— ⭐</div>
          <div class="settings-icon" onclick="toggleSettings()">⚙️</div>
        </div>
      </div>
      <div class="settings-panel" id="settings-panel">
        <button class="settings-btn" onclick="alertInApp('Смена языка позже')">Сменить язык</button>
        <button class="settings-btn" onclick="alertInApp('Стример‑режим позже')">Стример‑режим</button>
        <button class="settings-btn" onclick="openAdminPanel()">Админ‑панель</button>
      </div>
    </header>

    <main id="screen-content"></main>

    <nav class="bottom-nav">
      <button class="nav-btn nav-btn-active" data-tab="games" onclick="setTab('games')">
        🎮<span>Игры</span>
      </button>
      <button class="nav-btn" data-tab="balance" onclick="setTab('balance')">
        💰<span>Баланс</span>
      </button>
      <button class="nav-btn" data-tab="profile" onclick="setTab('profile')">
        👤<span>Профиль</span>
      </button>
    </nav>

  </div>

  <script src="app.js"></script>
</body>
</html>
