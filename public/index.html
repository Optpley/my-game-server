<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AllPvpGamesHub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="app">
    <h1>AllPvpGamesHub</h1>

    <div class="block">
      <h2>Ваш баланс</h2>
      <div id="balance">Загрузка...</div>
    </div>

    <div class="block">
      <h2>Игры</h2>
      <button class="btn" onclick="joinGame('arena')">Арена</button>
      <button class="btn" onclick="joinGame('balls')">Шары</button>
      <button class="btn" onclick="joinGame('race')">Гонка</button>
    </div>

    <div class="block">
      <h2>Турнир</h2>
      <button class="btn" onclick="openTournament()">Открыть турнир</button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
