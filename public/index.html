<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AllPvpGamesHub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="app">
    <header id="main-header">
      <div class="title-row">
        <div class="app-title">AllPvpGamesHub</div>
        <div class="app-balance" id="header-balance">Баланс: — ⭐</div>
      </div>
      <div class="app-subtitle">PvP‑игры, турниры и звёзды</div>
    </header>

    <main id="screen-content">
      <!-- сюда рендерятся экраны -->
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn nav-btn-active" data-tab="games" onclick="setTab('games')">
        <span class="nav-icon">🎮</span>
        <span class="nav-label">Игры</span>
      </button>
      <button class="nav-btn" data-tab="balance" onclick="setTab('balance')">
        <span class="nav-icon">💰</span>
        <span class="nav-label">Баланс</span>
      </button>
      <button class="nav-btn" data-tab="profile" onclick="setTab('profile')">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Профиль</span>
      </button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
