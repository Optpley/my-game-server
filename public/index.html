<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AllPvpGamesHub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="app">
    <div id="screen-header">
      <div id="screen-title">Игры</div>
      <div id="screen-subtitle">AllPvpGamesHub</div>
    </div>

    <div id="screen-content"></div>

    <div class="bottom-nav">
      <div class="nav-btn" data-tab="games" onclick="setTab('games')">
        <div class="nav-icon">🎮</div>
        <div class="nav-label">Игры</div>
      </div>
      <div class="nav-btn" data-tab="balance" onclick="setTab('balance')">
        <div class="nav-icon">💰</div>
        <div class="nav-label">Баланс</div>
      </div>
      <div class="nav-btn" data-tab="profile" onclick="setTab('profile')">
        <div class="nav-icon">👤</div>
        <div class="nav-label">Профиль</div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
