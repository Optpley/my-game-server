<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>AllPvPGamesHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="app">

  <header class="header">
    <div class="header-left">
      <div class="header-title">AllPvPGamesHub</div>
      <div id="header-balance" class="header-balance">0 ⭐</div>
    </div>
    <div class="header-right">
      <div id="header-avatar" class="header-avatar"></div>
    </div>
  </header>

  <main id="screen-content" class="screen games-screen">

    <div class="games-left">

      <div class="game-btn" style="--bg-image: url('images/ice.jpg')" data-mode="ice_arena">
        <div class="game-btn-title">Ice Arena</div>
        <div class="game-btn-sub">Классическая арена</div>
      </div>

      <div class="game-btn" style="--bg-image: url('images/elimination.jpg')" data-mode="elimination">
        <div class="game-btn-title">Выбивание</div>
        <div class="game-btn-sub">Каждый раунд вылетает один</div>
      </div>

      <div class="game-btn" style="--bg-image: url('images/ball.jpg')" data-mode="ball_race">
        <div class="game-btn-title">Гонка шаров</div>
        <div class="game-btn-sub">Шары катятся по трассе</div>
      </div>

      <div class="game-btn" style="--bg-image: url('images/color.jpg')" data-mode="color_arena">
        <div class="game-btn-title">Красочная арена</div>
        <div class="game-btn-sub">Закрашивай зоны</div>
      </div>

    </div>

    <div class="mix-right" style="--bg-image: url('images/mix.jpg')">
      <div class="mix-title">Микс режим</div>
      <div class="mix-sub">Случайный режим дня</div>
      <div id="mix-timer" class="mix-timer">12:55:17</div>
    </div>

  </main>

  <nav class="nav">
    <button class="nav-btn nav-btn-active" data-tab="games" onclick="setTab('games')">Игры</button>
    <button class="nav-btn" data-tab="balance" onclick="setTab('balance')">Баланс</button>
    <button class="nav-btn" data-tab="profile" onclick="setTab('profile')">Профиль</button>
  </nav>

</div>

<script src="app.js"></script>
</body>
</html>
