<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>AllPvpGamesHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="app-root">
  <div id="app">
    <header class="top-bar">
      <div class="balance">
        <span id="balanceValue">0</span> ⭐
      </div>
      <button id="addStarsBtn" class="icon-btn">+</button>
    </header>

    <main class="main-content">
      <section class="profile-section">
        <div class="profile-avatar" id="profileAvatar"></div>
        <div class="profile-info">
          <div id="profileName" class="profile-name">Игрок</div>
          <div id="profileUsername" class="profile-username">@username</div>
        </div>
        <button id="adminBtn" class="icon-btn">😈</button>
      </section>

      <section class="global-stats">
        Игроков онлайн: <span id="onlineCount">0</span> • Общий банк:
        <span id="totalBank">0</span> ⭐
      </section>

      <section class="modes-grid">
        <button class="mode-card" data-mode="ice_arena">
          <div class="mode-title">Арена</div>
          <div class="mode-sub">Ставка → территория</div>
        </button>
        <button class="mode-card" data-mode="elimination">
          <div class="mode-title">Выбывание</div>
          <div class="mode-sub">Последний выжил</div>
        </button>
        <button class="mode-card" data-mode="color_arena">
          <div class="mode-title">Цветная арена</div>
          <div class="mode-sub">Кто больше закрасит</div>
        </button>
        <button class="mode-card" data-mode="ball_race">
          <div class="mode-title">Гонка мячей</div>
          <div class="mode-sub">Кто быстрее</div>
        </button>
        <button class="mode-card" data-mode="meteor_fall">
          <div class="mode-title">Падение метеоритов</div>
          <div class="mode-sub">Уклоняйся</div>
        </button>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn nav-btn-active" data-tab="game">Игры</button>
      <button class="nav-btn" data-tab="balance">Баланс</button>
      <button class="nav-btn" data-tab="profile">Профиль</button>
    </nav>
  </div>

  <!-- Админ-панель -->
  <div id="adminOverlay" class="overlay hidden">
    <div class="overlay-content">
      <h2>Админ-панель</h2>

      <div class="admin-block">
        <h3>Выдать звёзды</h3>
        <input id="adminUser" placeholder="@username" />
        <input id="adminAmount" type="number" placeholder="Сколько звёзд" />
        <button id="adminGiveBtn" class="primary-btn">Выдать</button>
      </div>

      <div class="admin-block">
        <h3>Рассылка</h3>
        <textarea id="adminBroadcastText" placeholder="Текст сообщения"></textarea>
        <button id="adminBroadcastBtn" class="primary-btn">Отправить</button>
      </div>

      <div class="admin-block">
        <h3>Турнир</h3>
        <input id="tournamentMode" placeholder="mode (ice_arena...)" />
        <input id="tournamentBet" type="number" placeholder="Ставка" />
        <input id="tournamentPrize" type="number" placeholder="Приз" />
        <button id="tournamentCreateBtn" class="primary-btn">Создать</button>
      </div>

      <button id="adminCloseBtn" class="secondary-btn">Закрыть</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
